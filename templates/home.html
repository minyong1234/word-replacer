<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보안컨설팅팀 업무 도구</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #F4F3F0;
      --surface: #FFFFFF;
      --border:  #E0DED8;
      --text:    #1A1916;
      --muted:   #7A7670;
      --blue:    #1E4D8C;
      --blue-lt: #EBF0F8;
      --blue-hv: #163A6A;
      --teal:    #0F6E56;
      --teal-lt: #E8F5F1;
      --teal-hv: #0A4F3D;
    }

    body {
      font-family: "맑은 고딕", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .header .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .6rem;
    }
    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .header p {
      margin-top: .5rem;
      font-size: 14px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
      max-width: 560px;
    }

    .tool-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 1.75rem 1.5rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: .85rem;
      transition: border-color .15s, transform .12s, box-shadow .15s;
      cursor: pointer;
    }
    .tool-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
    }
    .tool-card.blue:hover  { border-color: var(--blue); }
    .tool-card.teal:hover  { border-color: var(--teal); }

    .tool-icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .tool-card.blue .tool-icon { background: var(--blue-lt); }
    .tool-card.teal .tool-icon { background: var(--teal-lt); }

    .tool-name {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
    }
    .tool-desc {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.6;
    }

    .tool-arrow {
      margin-top: auto;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: .3rem;
    }
    .tool-card.blue .tool-arrow { color: var(--blue); }
    .tool-card.teal .tool-arrow { color: var(--teal); }

    .arrow-icon {
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      transition: transform .15s;
    }
    .tool-card.blue .arrow-icon { background: var(--blue-lt); }
    .tool-card.teal .arrow-icon { background: var(--teal-lt); }
    .tool-card:hover .arrow-icon { transform: translateX(3px); }

    .footer {
      margin-top: 2rem;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 440px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>업무 도구 모음</h1>
    <p>사용할 도구를 선택하세요</p>
  </div>

  <div class="grid">

    <a class="tool-card blue" href="/replacer">
      <div class="tool-icon">📝</div>
      <div>
        <div class="tool-name">워드 단어 치환기</div>
        <div class="tool-desc">Word 문서 내 특정 단어를 일괄 치환하여 다운로드</div>
      </div>
      <div class="tool-arrow">
        바로가기
        <span class="arrow-icon">→</span>
      </div>
    </a>

    <a class="tool-card teal" href="/wbs">
      <div class="tool-icon">📊</div>
      <div>
        <div class="tool-name">CSAP 컨설팅 킥오프 일정 WBS</div>
        <div class="tool-desc">고객사명·시작일 입력으로 WBS 엑셀 자동 생성</div>
      </div>
      <div class="tool-arrow">
        바로가기
        <span class="arrow-icon">→</span>
      </div>
    </a>

  </div>

  <div class="footer">도구 추가 문의: 개발팀</div>

</body>
</html>
